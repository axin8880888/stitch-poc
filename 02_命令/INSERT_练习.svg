<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="500px" version="1.1" width="650px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fafafa" height="500" width="650" x="0" y="0" /><text font-size="18" font-weight="bold" x="30" y="20">INSERT (I) — 块命令</text><text font-size="12" x="30" y="50">用途: 插入已定义的块</text><text fill="#444" font-size="11" x="30" y="70">示例: I → 选块名 → 插入点 → 比例1 → 角度0</text><text fill="#aa3333" font-size="11" x="30" y="90">常见错误: 忘记调整比例和角度</text><text fill="#666" font-size="10" x="30" y="110">小知识: I插入时可以在对话框中预览块</text><text font-size="12" font-weight="bold" x="30" y="140">练习题:</text><text fill="#336699" font-size="11" x="30" y="158">插入门块到墙体中（调整旋转角度）</text><line stroke="#ddd" stroke-width="0.5" x1="30" x2="600" y1="233" y2="233" /><line stroke="#ddd" stroke-width="0.5" x1="300" x2="300" y1="193" y2="283" /><text fill="#aaa" font-size="14" text-anchor="middle" x="300" y="238">练习命令: INSERT</text></svg>