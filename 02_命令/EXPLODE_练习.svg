<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="500px" version="1.1" width="650px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fafafa" height="500" width="650" x="0" y="0" /><text font-size="18" font-weight="bold" x="30" y="20">EXPLODE (X) — 修改命令</text><text font-size="12" x="30" y="50">用途: 将块/多段线分解为单个对象</text><text fill="#444" font-size="11" x="30" y="70">示例: X → 选对象 → Enter</text><text fill="#aa3333" font-size="11" x="30" y="90">常见错误: 分解后块的属性丢失变为普通文字</text><text fill="#666" font-size="10" x="30" y="110">小知识: 能不用X就不用——块是结构化的，X掉就没了</text><text font-size="12" font-weight="bold" x="30" y="140">练习题:</text><text fill="#336699" font-size="11" x="30" y="158">分解一个PLINE为单独线段</text><line stroke="#ddd" stroke-width="0.5" x1="30" x2="600" y1="233" y2="233" /><line stroke="#ddd" stroke-width="0.5" x1="300" x2="300" y1="193" y2="283" /><text fill="#aaa" font-size="14" text-anchor="middle" x="300" y="238">练习命令: EXPLODE</text></svg>