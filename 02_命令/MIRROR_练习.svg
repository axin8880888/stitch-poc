<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="500px" version="1.1" width="650px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fafafa" height="500" width="650" x="0" y="0" /><text font-size="18" font-weight="bold" x="30" y="20">MIRROR (MI) — 修改命令</text><text font-size="12" x="30" y="50">用途: 镜像复制对象</text><text fill="#444" font-size="11" x="30" y="70">示例: MI → 选对象 → 镜像线第一点 → 第二点 → N</text><text fill="#aa3333" font-size="11" x="30" y="90">常见错误: 文字被镜像变反字（MIRRTEXT=0可解决）</text><text fill="#666" font-size="10" x="30" y="110">小知识: 对称户型用MI至少省一半时间</text><text font-size="12" font-weight="bold" x="30" y="140">练习题:</text><text fill="#336699" font-size="11" x="30" y="158">把卫生间布局镜像到另一侧（保留源）</text><line stroke="#ddd" stroke-width="0.5" x1="30" x2="600" y1="233" y2="233" /><line stroke="#ddd" stroke-width="0.5" x1="300" x2="300" y1="193" y2="283" /><polygon fill="none" points="100,203 150,203 130,253 100,253" stroke="#222" stroke-width="2" /><polygon fill="none" points="300,203 250,203 270,253 300,253" stroke="#888" stroke-width="1" /><line stroke="#aaa" stroke-dasharray="5,3" stroke-width="1" x1="200" x2="200" y1="193" y2="263" /><text fill="#aaa" font-size="9" x="203" y="198">镜像轴</text></svg>