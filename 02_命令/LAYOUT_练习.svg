<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="500px" version="1.1" width="650px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fafafa" height="500" width="650" x="0" y="0" /><text font-size="18" font-weight="bold" x="30" y="20">LAYOUT (LO) — 输出命令</text><text font-size="12" x="30" y="50">用途: 创建和管理布局</text><text fill="#444" font-size="11" x="30" y="70">示例: 右键布局标签 → 新建布局 → 页面设置管理器</text><text fill="#aa3333" font-size="11" x="30" y="90">常见错误: 在模型空间排图（应该在布局空间）</text><text fill="#666" font-size="10" x="30" y="110">小知识: 一张图可以有很多布局，每个布局对应一张图纸</text><text font-size="12" font-weight="bold" x="30" y="140">练习题:</text><text fill="#336699" font-size="11" x="30" y="158">创建3个布局（A1平面/A2立面/A3节点）分别设置出图比例</text><line stroke="#ddd" stroke-width="0.5" x1="30" x2="600" y1="233" y2="233" /><line stroke="#ddd" stroke-width="0.5" x1="300" x2="300" y1="193" y2="283" /><text fill="#aaa" font-size="14" text-anchor="middle" x="300" y="238">练习命令: LAYOUT</text></svg>