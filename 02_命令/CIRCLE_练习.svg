<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="500px" version="1.1" width="650px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fafafa" height="500" width="650" x="0" y="0" /><text font-size="18" font-weight="bold" x="30" y="20">CIRCLE (C) — 绘图命令</text><text font-size="12" x="30" y="50">用途: 绘制圆形</text><text fill="#444" font-size="11" x="30" y="70">示例: C → 圆心 → 半径500</text><text fill="#aa3333" font-size="11" x="30" y="90">常见错误: 半径和直径搞混（看看参数提示栏）</text><text fill="#666" font-size="10" x="30" y="110">小知识: TTR方式可以直接画出与两条线相切的圆</text><text font-size="12" font-weight="bold" x="30" y="140">练习题:</text><text fill="#336699" font-size="11" x="30" y="158">画一个半径300的圆, 再画一个直径500的圆</text><line stroke="#ddd" stroke-width="0.5" x1="30" x2="600" y1="233" y2="233" /><line stroke="#ddd" stroke-width="0.5" x1="300" x2="300" y1="193" y2="283" /><circle cx="300" cy="238" fill="none" r="40" stroke="#222" stroke-width="2.5" /><text fill="#888" font-size="10" text-anchor="middle" x="300" y="238">R=300</text></svg>