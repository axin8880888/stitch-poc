<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="500px" version="1.1" width="650px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fafafa" height="500" width="650" x="0" y="0" /><text font-size="18" font-weight="bold" x="30" y="20">ARC (A) — 绘图命令</text><text font-size="12" x="30" y="50">用途: 绘制圆弧</text><text fill="#444" font-size="11" x="30" y="70">示例: A → 起点 → C(圆心) → 端点</text><text fill="#aa3333" font-size="11" x="30" y="90">常见错误: 逆时针与顺时针方向搞混</text><text fill="#666" font-size="10" x="30" y="110">小知识: ARC有11种画法，但常用的就两三种</text><text font-size="12" font-weight="bold" x="30" y="140">练习题:</text><text fill="#336699" font-size="11" x="30" y="158">画一条180度的半圆弧，半径200</text><line stroke="#ddd" stroke-width="0.5" x1="30" x2="600" y1="233" y2="233" /><line stroke="#ddd" stroke-width="0.5" x1="300" x2="300" y1="193" y2="283" /><path d="M 150,238 A 150,150 0 0,1 450,238" fill="none" stroke="#222" stroke-width="2.5" /><text fill="#888" font-size="10" text-anchor="middle" x="300" y="233">180°半圆</text></svg>