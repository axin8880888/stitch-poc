name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Define Android SDK root
        run: |
          SDK_DIR="$HOME/android-sdk"
          mkdir -p "$SDK_DIR"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
          printf 'sdk.dir=%s\n' "$SDK_DIR" > local.properties

      - name: Install Android command line tools
        run: |
          mkdir -p "$SDK_DIR/cmdline-tools"
          curl -fsSL -o /tmp/commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q /tmp/commandlinetools.zip -d "$SDK_DIR/cmdline-tools"
          mv "$SDK_DIR/cmdline-tools/cmdline-tools" "$SDK_DIR/cmdline-tools/latest"
          echo "$SDK_DIR/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept licenses
        run: yes | sdkmanager --sdk_root="$SDK_DIR" --licenses

      - name: Install required SDK packages
        run: |
          sdkmanager --sdk_root="$SDK_DIR" "platforms;android-34" "build-tools;34.0.0"
      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Build release
        run: sh ./gradlew clean assembleRelease --no-daemon

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            **/build/outputs/apk/release/*.apk
