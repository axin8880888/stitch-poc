name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Detect Android SDK path
        run: |
          SDK_DIR="$(dirname "$(dirname "$(readlink -f "$(command -v sdkmanager)")")")"
          echo "ANDROID_HOME=$SDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
          printf 'sdk.dir=%s\n' "$SDK_DIR" > local.properties
          sdkmanager --sdk_root="$SDK_DIR" --licenses <<<'y'
          sdkmanager --sdk_root="$SDK_DIR" "platforms;android-34" "build-tools;34.0.0"

      - name: Accept licenses
        run: yes | sdkmanager --licenses
      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Build release
        run: sh ./gradlew clean assembleRelease --no-daemon

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            **/build/outputs/apk/release/*.apk
